<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج تحكم عن بعد</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; transition: background 0.5s; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        #status { color: blue; font-weight: bold; }
    </style>
</head>
<body>

    <h2>نظام الربط عن بعد</h2>
    <p>معرفك الحالي: <span id="my-id">جاري التحميل...</span></p>
    
    <hr>

    <h3>الجهاز الأول (المرسل):</h3>
    <input type="text" id="remote-id" placeholder="أدخل معرف الجوال الآخر">
    <button onclick="connectToDevice()">ربط الآن</button>
    <br>
    <button onclick="sendCommand('red')">تغيير للون الأحمر</button>
    <button onclick="sendCommand('green')">تغيير للون الأخضر</button>

    <hr>

    <h3>حالة الاتصال:</h3>
    <p id="status">غير متصل</p>

    <script>
        const peer = new Peer(); // إنشاء معرف فريد للجهاز
        let conn;

        // عرض المعرف الخاص بك لتكتبه في الجهاز الآخر
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // استقبال الاتصال من الجهاز الأول
        peer.on('connection', (connection) => {
            conn = connection;
            setupReceiver();
        });

        // وظيفة الربط بالجهاز الآخر
        function connectToDevice() {
            const remoteId = document.getElementById('remote-id').value;
            conn = peer.connect(remoteId);
            setupReceiver();
        }

        function setupReceiver() {
            document.getElementById('status').innerText = "متصل بنجاح!";
            conn.on('data', (data) => {
                // تنفيذ الأمر المستلم (تغيير لون الخلفية)
                document.body.style.backgroundColor = data;
            });
        }

        // إرسال الأوامر
        function sendCommand(color) {
            if (conn && conn.open) {
                conn.send(color);
            } else {
                alert("يرجى الاتصال بالجهاز أولاً");
            }
        }
    </script>
</body>
</html>
